# ─────────────────────────────────────────────────────────────────────────────
#  TechServ ERP — Render Deployment Blueprint
#  render.yaml  (Infrastructure as Code)
#
#  Services:
#    - PostgreSQL 16  (managed database)
#    - Redis 7        (managed cache)
#    - API            (Fastify — Docker)
#    - Web            (Next.js 14 — Docker)
#
#  Deploy:
#    1. Push this repo to GitHub
#    2. Go to https://dashboard.render.com → New → Blueprint
#    3. Connect your repo → Render reads this file and provisions everything
#    4. Fill in the required env var values marked with sync: false
# ─────────────────────────────────────────────────────────────────────────────

databases:
  # ── PostgreSQL ────────────────────────────────────────────────
  - name: erp-postgres
    databaseName: erp_db
    user: erp
    plan: starter                 # starter (free) | standard | pro
    region: singapore             # sgp | ohio | oregon | frankfurt | virginia
    # postgresMajorVersion: 16    # Render defaults to latest; pin if needed

  # ── Redis ─────────────────────────────────────────────────────
  - name: erp-redis
    plan: starter                 # starter (free) | standard
    region: singapore
    ipAllowList: []               # empty = only internal Render services can connect

services:
  # ── API (Fastify + Prisma) ────────────────────────────────────
  - type: web
    name: erp-api
    region: singapore
    plan: starter                 # starter | standard | pro
    runtime: docker
    dockerfilePath: apps/api/Dockerfile
    dockerContext: .              # build context = repo root (monorepo)
    branch: main
    healthCheckPath: /health

    autoDeploy: true              # redeploy on every push to main

    envVars:
      # ── Database (auto-injected from the managed DB above) ────
      - key: DATABASE_URL
        fromDatabase:
          name: erp-postgres
          property: connectionString

      # ── Redis (auto-injected from managed Redis above) ────────
      - key: REDIS_URL
        fromService:
          name: erp-redis
          type: redis
          property: connectionString

      # ── Node ──────────────────────────────────────────────────
      - key: NODE_ENV
        value: production

      - key: PORT
        value: "3001"

      - key: API_PREFIX
        value: /api/v1

      # ── JWT secrets (generate with: openssl rand -hex 32) ─────
      - key: JWT_SECRET
        generateValue: true       # Render auto-generates a secure random value

      - key: JWT_REFRESH_SECRET
        generateValue: true

      - key: JWT_ACCESS_EXPIRES
        value: 15m

      - key: JWT_REFRESH_EXPIRES
        value: 7d

      # ── CORS — set to your web service URL after first deploy ──
      - key: CORS_ORIGINS
        value: https://erp-web.onrender.com   # update after web service is live

      # ── Email / SendGrid ──────────────────────────────────────
      - key: SMTP_HOST
        value: smtp.sendgrid.net

      - key: SMTP_PORT
        value: "587"

      - key: SMTP_USER
        value: apikey

      - key: SMTP_PASS
        sync: false               # paste your SendGrid API key in Render dashboard

      - key: FROM_EMAIL
        value: noreply@yourdomain.com   # update to your verified sender

      - key: FROM_NAME
        value: TechServ ERP

      - key: HR_ALERT_EMAIL
        value: hr@yourdomain.com        # update to your HR team email

      # ── File storage ──────────────────────────────────────────
      - key: STORAGE_PROVIDER
        value: local              # change to s3 when you add S3 credentials

  # ── Web (Next.js) ─────────────────────────────────────────────
  - type: web
    name: erp-web
    region: singapore
    plan: starter
    runtime: docker
    dockerfilePath: apps/web/Dockerfile
    dockerContext: apps/web       # build context = web app only
    branch: main

    autoDeploy: true

    envVars:
      - key: NODE_ENV
        value: production

      # ── Point web to the API service ──────────────────────────
      # Render gives each service an internal URL: https://<name>.onrender.com
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: erp-api
          type: web
          property: host
          envVarKey: NEXT_PUBLIC_API_URL
