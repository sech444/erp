# ─────────────────────────────────────────────────────────────────────────────
#  TechServ ERP — Render Blueprint
#  render.yaml
#
#  Deploy: Render → New → Blueprint → connect repo → done
# ─────────────────────────────────────────────────────────────────────────────

databases:
  - name: erp-postgres
    databaseName: erp_db
    user: erp
    plan: starter
    region: singapore

  - name: erp-redis
    plan: starter
    region: singapore
    ipAllowList: []

services:
  # ── API ───────────────────────────────────────────────────────
  - type: web
    name: erp-api
    region: singapore
    plan: starter
    runtime: docker
    dockerfilePath: apps/api/Dockerfile    # relative to repo root, no leading ./
    dockerContext: .                        # repo root = build context
    branch: main
    healthCheckPath: /health
    autoDeploy: true

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: erp-postgres
          property: connectionString

      - key: REDIS_URL
        fromService:
          name: erp-redis
          type: redis
          property: connectionString

      - key: NODE_ENV
        value: production

      - key: PORT
        value: "3001"

      - key: API_PREFIX
        value: /api/v1

      - key: JWT_SECRET
        generateValue: true

      - key: JWT_REFRESH_SECRET
        generateValue: true

      - key: JWT_ACCESS_EXPIRES
        value: 15m

      - key: JWT_REFRESH_EXPIRES
        value: 7d

      - key: CORS_ORIGINS
        value: https://erp-web.onrender.com

      - key: SMTP_HOST
        value: smtp.sendgrid.net

      - key: SMTP_PORT
        value: "587"

      - key: SMTP_USER
        value: apikey

      - key: SMTP_PASS
        sync: false

      - key: FROM_EMAIL
        value: noreply@yourdomain.com

      - key: FROM_NAME
        value: TechServ ERP

      - key: HR_ALERT_EMAIL
        value: hr@yourdomain.com

      - key: STORAGE_PROVIDER
        value: local

  # ── Web ───────────────────────────────────────────────────────
  - type: web
    name: erp-web
    region: singapore
    plan: starter
    runtime: docker
    dockerfilePath: apps/web/Dockerfile    # relative to repo root
    dockerContext: .                # web dir = build context
    branch: main
    autoDeploy: true

    envVars:
      - key: NODE_ENV
        value: production

      - key: NEXT_PUBLIC_API_URL
        value: https://erp-api.onrender.com   # update after first API deploy
