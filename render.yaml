databases:
  - name: erp-postgres
    databaseName: erp_db
    user: erp
    plan: starter
    region: singapore

  - name: erp-redis
    plan: starter
    region: singapore
    ipAllowList: []

services:
  - type: web
    name: erp-api
    region: singapore
    plan: starter
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    branch: main
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: erp-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: erp-redis
          type: redis
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: https://erp-web.onrender.com

  - type: web
    name: erp-web
    region: singapore
    plan: starter
    runtime: docker
    dockerfilePath: ./apps/web/Dockerfile
    dockerContext: .
    branch: main
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: erp-api
          type: web
          property: host
          envVarKey: NEXT_PUBLIC_API_URL
